<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Askıda Yemek - Gıda israfını önleyen, ihtiyaç sahiplerini restoranlarla buluşturan platform">
    <title>{% block title %}Askıda Yemek{% endblock %} | Askıda Yemek</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Leaflet CSS (Harita) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Ana Stil -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="flash-container" id="flash-container">
            {% for category, message in messages %}
            <div class="flash-message flash-{{ category }}">
                <span>{{ message }}</span>
                <button class="flash-close" onclick="this.parentElement.remove()">&times;</button>
            </div>
            {% endfor %}
        </div>
        {% endif %}
    {% endwith %}

    {% block body %}{% endblock %}

    <!-- Dil Değiştirme Butonu -->
    <div style="position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; gap: 5px; background: white; padding: 5px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.15);">
        <a href="{{ url_for('set_lang', lang_code='tr') }}" style="padding: 6px 12px; border-radius: 6px; text-decoration: none; font-size: 12px; font-weight: 700; {% if lang == 'tr' %}background: #7C9A6E; color: white;{% else %}background: #f3f4f6; color: #374151;{% endif %}">TR</a>
        <a href="{{ url_for('set_lang', lang_code='en') }}" style="padding: 6px 12px; border-radius: 6px; text-decoration: none; font-size: 12px; font-weight: 700; {% if lang == 'en' %}background: #7C9A6E; color: white;{% else %}background: #f3f4f6; color: #374151;{% endif %}">EN</a>
    </div>

    <!-- Leaflet JS (Harita) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Ana JavaScript -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>

    {% block scripts %}{% endblock %}
</body>
</html>
